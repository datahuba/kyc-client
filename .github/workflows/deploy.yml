name: 🕵️ Auditoria de VPS Hostinger

on:
  push:
    branches:
      - develop_kevin

jobs:
  audit_server:
    runs-on: ubuntu-latest

    steps:
      - name: Escaneo Profundo del VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          script: |
            echo "=========================================================="
            echo "           AUDITORÍA DE RED Y PROCESOS DEL VPS            "
            echo "=========================================================="
            
            echo -e "\n1. ¿QUÉ SERVICIOS ESTÁN ESCUCHANDO EN EL PUERTO 3000? (Uso de red puro)"
            sudo netstat -tulpn | grep :3000 || echo "Ninguno detectado por netstat."
            
            echo -e "\n2. ¿QUIÉN TIENE EL SOCKET 3000 ABIERTO? (Uso de archivos/sockets)"
            sudo lsof -i -P -n | grep 3000 || echo "Ninguno detectado por lsof."
            
            echo -e "\n3. ESTADO DEL MOTOR DOCKER Y REDES"
            docker ps -a
            
            echo -e "\n4. ¿HAY PROCESOS DE NODE O PM2 CORRIENDO EN SEGUNDO PLANO?"
            ps aux | grep node | grep -v grep || echo "No hay procesos nativos de Node.js."
            ps aux | grep pm2 | grep -v grep || echo "No hay procesos de PM2."
            
            echo -e "\n5. ÚLTIMOS ERRORES DEL SISTEMA OPERATIVO (Logs recientes)"
            sudo journalctl -xe -n 20 || echo "No se pudo leer journalctl."
            
            echo "=========================================================="
            echo "                   FIN DE LA AUDITORÍA                    "
            echo "=========================================================="
            