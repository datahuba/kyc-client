name: Deploy Frontend to VPS

on:
  push:
    branches:
      - develop_kevin

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Desmantelamiento de PM2 y Despliegue en Docker
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          script: |
            echo "🛑 === APAGANDO GOD DAEMON (PM2) Y LIBERANDO PUERTOS === 🛑"
            pm2 kill || true
            pm2 unstartup || true
            sudo killall -9 node || true
            
            echo "📥 === SINCRONIZACIÓN NUCLEAR DE GITHUB === 📥"
            cd /var/www/frontend
            # 1. Descargar todo de la nube sin fusionar
            git fetch --all
            # 2. Forzar al servidor a pararse en nuestra rama
            git checkout develop_kevin || git checkout -b develop_kevin origin/develop_kevin
            # 3. Botón Nuclear: Destruir diferencias y hacer un clon exacto
            git reset --hard origin/develop_kevin
            
            echo "🚀 === RECONSTRUYENDO DOCKER DESDE CERO === 🚀"
            cd /var/www
            docker compose build --no-cache frontend
            docker compose up -d --no-deps --force-recreate frontend
            
            echo "✅ === SISTEMA DESPLEGADO EN PRODUCCIÓN === ✅"
            