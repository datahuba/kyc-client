name: Deploy Frontend to VPS

on:
  push:
    branches:
      - develop_kevin

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Sincronización y Reconstrucción Absoluta
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          script: |
            echo "🧹 1. LIMPIANDO ESTADO LOCAL DEL VPS..."
            cd /var/www/frontend
            git reset --hard
            git clean -fd
            
            echo "📥 2. DESCARGANDO CÓDIGO NUEVO..."
            git pull origin develop_kevin
            
            echo "🔎 3. VERIFICANDO QUE EL CÓDIGO LLEGÓ (Último commit):"
            git log -1 --oneline
            
            echo "🔥 4. DESTRUYENDO CACHÉ FÍSICO DE SVELTE..."
            rm -rf build/ .svelte-kit/ node_modules/
            
            echo "🧨 5. DESTRUYENDO IMAGEN VIEJA DE DOCKER..."
            cd /var/www
            docker compose stop frontend || true
            docker compose rm -f frontend || true
            # Borra la imagen física para evitar que Docker use capas viejas
            docker rmi -f $(docker images -q www-frontend) || true
            docker rmi -f $(docker images -q *frontend*) || true
            
            echo "🚀 6. CONSTRUYENDO Y LEVANTANDO DESDE CERO..."
            docker compose build --no-cache frontend
            docker compose up -d --no-deps --force-recreate frontend
            
            echo "✅ DESPLIEGUE FINALIZADO"
            