name: Deploy Frontend to VPS

on:
  push:
    branches:
      - develop_kevin

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Diagnóstico de Servidor y Despliegue
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          script: |
            echo "🔍 === INICIANDO DIAGNÓSTICO EN EL VPS ==="
            echo "Usuario SSH actual: $(whoami)"
            
            echo "🔍 === ¿QUIÉN TIENE SECUESTRADO EL PUERTO 3000? ==="
            sudo ss -tulpn | grep :3000 || true
            
            echo "🔍 === ESTADO ACTUAL DE LOS CONTENEDORES ==="
            docker ps -a
            
            echo "🔨 === APLICANDO REINICIO PROFUNDO DE DOCKER ==="
            # Esto fuerza al sistema operativo a reiniciar el motor de Docker, 
            # liberando cualquier puerto (docker-proxy) que se haya quedado pegado.
            sudo systemctl restart docker || true
            
            echo "🚀 === INICIANDO DESPLIEGUE ==="
            # Destruimos explícitamente el contenedor por su nombre exacto en los logs
            docker rm -f kyc-frontend || true
            
            cd /var/www/frontend
            git stash
            git pull origin develop_kevin
            
            cd /var/www
            docker compose up -d --build frontend
            