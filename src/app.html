<!doctype html>
<html lang="es">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<link rel="icon" href="/images/logo_datahub.png" />
		<script>
			// Anti-flash de tema: aplica la clase .dark antes del primer render
			(function () {
				try {
					var m = localStorage.getItem('kyc_theme');
					var dark =
						m === 'dark' ||
						((!m || m === 'system') &&
							window.matchMedia('(prefers-color-scheme: dark)').matches);
					if (dark) document.documentElement.classList.add('dark');
				} catch (e) {}
			})();
		</script>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
